# Site Profile: site-a
# Per-site defaults for vSphere infrastructure

site_name: site-a

# vSphere
vcenter: vcenter.site-a.example.local
vcenter_user: administrator@vsphere.local
vcenter_password_env: VSPHERE_PASSWORD       # Read from environment variable
datacenter: DC-SiteA
vsphere_cluster: Cluster-Prod-01
datastore: datastore-prod-01
datastore_cluster: DSC-Prod-SiteA
resource_pool: OCP-Clusters

# VM Defaults
vm_template: rhcos-420
guest_id: coreos64Guest
disk_size: 120
disk_thin_provisioned: true

# Network
base_domain: ocp.example.local
search_domain: example.local
dns_servers:
  - 10.100.0.10
  - 10.100.0.11
dns_key_name: "ocp-update-key"
dns_key_secret_env: DNS_TSIG_SECRET         # TSIG key for nsupdate
dns_server_target: 10.100.0.10              # DNS server to send updates to

# Gateway offset: which host address in the subnet is the gateway
# e.g., for 10.0.1.0/24 with gateway_offset=254 -> gateway is 10.0.1.254
gateway_offset: 254

# IP allocation offsets from network address
# infra nodes get offsets 1-3, control planes get 4-6, bootstrap gets 7
infra_ip_offsets: [1, 2, 3]
control_plane_ip_offsets: [4, 5, 6]
bootstrap_ip_offset: 7
api_vip_offset: 8
ingress_vip_offset: 9

# Node sizing
control_plane:
  count: 3
  cpus: 8
  memory_mb: 24576

infra:
  count: 3
  cpus: 8
  memory_mb: 32768

# VLAN Manager
vlan_manager_url: http://vlan-manager.site-a.example.local:8000
vlan_manager_vrf: default

# Container Registry (disconnected)
registry_url: registry.example.local:5000
registry_path: ocp4/openshift4

# Openshift installer path
openshift_install_bin: /usr/local/bin/openshift-install-4.20

# Terraform
terraform_dir: /opt/ocp-terraform
terraform_bin: /usr/local/bin/terraform
