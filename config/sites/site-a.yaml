# Site Profile: site-a
# Only site-specific values — everything else is inherited from config/defaults.yaml

site_name: site-a

# vSphere
vcenter: vcenter.site-a.example.local
vcenter_user: administrator@vsphere.local
vcenter_password_env: VSPHERE_PASSWORD
datacenter: DC-SiteA
vsphere_cluster: Cluster-Prod-01
vsphere_datastore_cluster: DSC-Prod-SiteA
vsphere_dvs_name: DVS-Prod-SiteA
vsphere_folder: /DC-SiteA/vm/OCP-Clusters
vm_template: rhcos-420

# Network
base_domain: ocp.example.local
search_domain: example.local
dns_servers:
  - 10.100.0.10
  - 10.100.0.11

# Container Registry mirrors (disconnected)
# One entry per source — add more entries for operators, additional registries, etc.
image_mirrors:
  - source: quay.io/openshift-release-dev/ocp-release
    mirror: mirror.registry.example.local:5000/openshift/release
  - source: quay.io/openshift-release-dev/ocp-v4.0-art-dev
    mirror: mirror.registry.example.local:5000/openshift/release
  - source: registry.redhat.io
    mirror: mirror.registry.example.local:5000

# Wildcard DNS API (*.apps only; api/api-int handled by Terraform exec provisioner)
wildcard_dns_api_url: http://dns-api.example.local:8080/api/wildcard

# VLAN Manager
vlan_manager_url: http://vlan-manager.site-a.example.local:8000
